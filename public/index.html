<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="NodakMesh Dashboard - Real-time MeshCore network monitoring">
  <title>NodakMesh Dashboard</title>

  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <script>
    // Apply saved theme before render to prevent flash
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'mc') document.documentElement.setAttribute('data-theme', 'mc');
  </script>
</head>
<body>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-brand">
        <svg class="nav-icon" viewBox="0 0 32 32" style="width:24px;height:24px;color:var(--color-accent)">
          <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M16 2V30M4 9L28 23M28 9L4 23" stroke="currentColor" stroke-width="1.5" opacity="0.4" fill="none"/>
          <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
        </svg>
        <span><span class="brand-nodak">NoDak</span><span class="brand-mesh">Mesh</span></span>
      </span>
      <div class="theme-toggle-group" id="theme-toggle">
        <button class="theme-toggle-btn" data-theme-value="" id="btn-mt">MT</button>
        <button class="theme-toggle-btn" data-theme-value="mc" id="btn-mc">MC</button>
      </div>
    </div>

    <div class="nav-section-label">Dashboard</div>
    <ul class="nav-links">
      <li>
        <a href="#/" class="nav-link" data-route="/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
      </li>
      <li>
        <a href="#/health" class="nav-link" data-route="/health">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          Health
        </a>
      </li>
      <li>
        <a href="#/repeaters" class="nav-link" data-route="/repeaters">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/></svg>
          Repeaters
        </a>
      </li>
      <li>
        <a href="#/map" class="nav-link" data-route="/map">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
          Map
        </a>
      </li>
    </ul>

    <div class="nav-section-label">Data</div>
    <ul class="nav-links">
      <li>
        <a href="#/packets" class="nav-link" data-route="/packets">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Packets
        </a>
      </li>
      <li>
        <a href="#/channels" class="nav-link" data-route="/channels">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          Channels
        </a>
      </li>
      <li>
        <a href="#/leaderboards" class="nav-link" data-route="/leaderboards">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7"/><rect x="6" y="9" width="12" height="13" rx="2"/></svg>
          Leaderboards
        </a>
      </li>
    </ul>

    <div class="nav-section-label">System</div>
    <ul class="nav-links">
      <li>
        <a href="#/observers" class="nav-link" data-route="/observers">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Observers
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <header class="mobile-header">
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <span class="mobile-brand"><span class="brand-nodak">NoDak</span><span class="brand-mesh">Mesh</span></span>
  </header>

  <main id="app"></main>

  <footer class="site-footer">
    NodakMesh Dashboard &mdash; FAR Region
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
